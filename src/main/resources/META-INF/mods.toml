modLoader="javafml"
loaderVersion="${loader_version_range}"
license="${mod_license}"

[[mods]]
modId="${mod_id}"
version="${mod_version}"
displayName="${mod_name}"
authors="${mod_authors}"
description='''
${mod_description}
'''

[[dependencies.bcattributes]]
modId="forge"
mandatory=true
versionRange="${forge_version_range}"
ordering="NONE"
side="BOTH"

[[dependencies.bcattributes]]
modId="minecraft"
mandatory=true
versionRange="[${mc_version},)"
ordering="NONE"
side="BOTH"

[[dependencies.bcattributes]]
modId="bettercombat"
mandatory=true
versionRange="${bettercombat_version_range}"
ordering="AFTER"
side="BOTH"

